<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>breath</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#030201}
canvas{display:block;cursor:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function(){
'use strict';

// ── CANVAS ──────────────────────────────────────────────────────────
const cv = document.getElementById('c');
let W = cv.width  = window.innerWidth;
let H = cv.height = window.innerHeight;
const cx = cv.getContext('2d');
window.addEventListener('resize', () => {
  W = cv.width  = window.innerWidth;
  H = cv.height = window.innerHeight;
  buildStars();
});

// ── GRAIN ────────────────────────────────────────────────────────────
// Two tile types, applied in sequence each frame.
//
// TECHNIQUE: achieving the reference "pixel density = tone" look requires
// two grain modes working together:
//
//   1. MULTIPLY grain (dark-biased) — applied first.
//      On white lantern bodies: dark grain pixels × white = dark speckles.
//      On black background:    anything × 0 = 0 (no effect).
//      Result: grain cuts dark holes through bright shapes only.
//
//   2. SCREEN grain (bright-biased) — applied after multiply.
//      On dark glow zones: additive bright speckles build up, restoring the bloom.
//      On black background: visible bright grain texture.
//      On now-textured bodies: subtle top-layer sparkle.
//      Result: glow zones become dense white grain dissolving into black.
//
// Together: no grey gradients. Every pixel is either a bright or dark speckle.
// Tone = density of white vs black dots, exactly like the charcoal references.

const GS = 256, GN = 7, GT = GS * 2; // tiles drawn at 2× for softer analog grain

// Multiply grain: heavily dark-biased (cuts through white)
const mulGrains = Array.from({length: GN}, () => {
  const g = document.createElement('canvas');
  g.width = g.height = GS;
  const gx = g.getContext('2d'), id = gx.createImageData(GS, GS);
  for (let i = 0; i < id.data.length; i += 4) {
    const r = Math.random();
    const v = r < 0.58 ? Math.random() * 52 | 0          // dark: punches through white
            : r < 0.82 ? 110 + Math.random() * 90 | 0    // mid
            :             215 + Math.random() * 40 | 0;   // bright: neutral in multiply
    id.data[i] = id.data[i+1] = id.data[i+2] = v;
    id.data[i+3] = 55 + Math.random() * 28 | 0;
  }
  gx.putImageData(id, 0, 0);
  return g;
});

// Screen grain: bright-biased (builds up glow zones and sparkle)
const scrGrains = Array.from({length: GN}, () => {
  const g = document.createElement('canvas');
  g.width = g.height = GS;
  const gx = g.getContext('2d'), id = gx.createImageData(GS, GS);
  for (let i = 0; i < id.data.length; i += 4) {
    const r = Math.random();
    const v = r < 0.38 ? 210 + Math.random() * 45 | 0    // bright: adds to glow
            : r < 0.70 ? 80  + Math.random() * 120 | 0   // mid
            :             Math.random() * 45 | 0;          // dark: neutral in screen
    id.data[i] = id.data[i+1] = id.data[i+2] = v;
    id.data[i+3] = 42 + Math.random() * 26 | 0;
  }
  gx.putImageData(id, 0, 0);
  return g;
});

function tile(g, alpha) {
  cx.globalAlpha = alpha;
  for (let tx = 0; tx < W; tx += GT)
    for (let ty = 0; ty < H; ty += GT)
      cx.drawImage(g, tx, ty, GT, GT);
}

function applyGrain(f) {
  // 1. Multiply: dark grain eats through white bodies
  cx.globalCompositeOperation = 'multiply';
  tile(mulGrains[ f       % GN], 0.64);
  tile(mulGrains[(f + 3)  % GN], 0.56);

  // 2. Screen: bright grain rebuilds glow zones and background texture
  cx.globalCompositeOperation = 'screen';
  tile(scrGrains[ f       % GN], 0.34);
  tile(scrGrains[(f + 2)  % GN], 0.28);
  tile(scrGrains[(f + 5)  % GN], 0.23);

  cx.globalAlpha = 1;
  cx.globalCompositeOperation = 'source-over';
}

// ── STARS ────────────────────────────────────────────────────────────
let stars = [];
function buildStars() {
  stars = Array.from({length: 200}, () => ({
    x:  Math.random() * W,
    y:  Math.random() * H * 0.68,
    r:  Math.random() < 0.87 ? 0.6 : 1.1 + Math.random() * 0.6,
    ph: Math.random() * Math.PI * 2,
    sp: 0.3 + Math.random() * 1.6,
    br: 0.2 + Math.random() * 0.7,
  }));
}
buildStars();

// ── AUDIO ────────────────────────────────────────────────────────────
let AC = null;
const NOTES = [130.81, 164.81, 196, 220, 261.63, 293.66, 329.63, 392, 440, 523.25];
function initAudio() {
  if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
  if (AC.state === 'suspended') AC.resume();
}
function playNote(freq) {
  try {
    if (!AC) return;
    if (AC.state === 'suspended') { AC.resume(); return; }
    const osc = AC.createOscillator();
    const env = AC.createGain();
    osc.connect(env); env.connect(AC.destination);
    osc.type = 'sine'; osc.frequency.value = freq;
    const t = AC.currentTime;
    env.gain.setValueAtTime(0, t);
    env.gain.linearRampToValueAtTime(0.13, t + 0.06);
    env.gain.exponentialRampToValueAtTime(0.001, t + 3.0);
    osc.start(t); osc.stop(t + 3.0);
  } catch(e) {}
}

// ── CAMERA & INPUT ───────────────────────────────────────────────────
let camZ = 0, tCamZ = 0;
let mouseX = W * 0.5, mouseY = H * 0.4;
let lastScrollT = 0, lastCursorT = 0;

const NEAR  = 65;
const FAR   = 2500;
const FOCAL = 720;
const HRZ   = 0.44;           // horizon 44% from top
const CR    = 280;            // cursor rekindle radius (screen px)

window.addEventListener('wheel', e => {
  e.preventDefault();
  tCamZ = Math.max(0, tCamZ + e.deltaY * 0.62);
  lastScrollT = Date.now();
  initAudio();
}, {passive: false});

window.addEventListener('mousemove', e => {
  mouseX = e.clientX; mouseY = e.clientY;
  lastCursorT = Date.now();
  initAudio();
});

window.addEventListener('click',      initAudio);
window.addEventListener('touchstart', () => { initAudio(); lastCursorT = Date.now(); }, {passive: true});
window.addEventListener('touchmove',  () => { lastCursorT = Date.now(); }, {passive: true});

// ── LANTERN POOL ─────────────────────────────────────────────────────
const TYPES = ['cyl', 'globe', 'tear'];
let pool = [], lid = 0, genZ = 3000;

function spawn(z0, z1) {
  const n = Math.round(10 + (z1 - z0) * 0.015);
  for (let i = 0; i < n; i++) {
    const id = lid++;
    // Pre-bake per-lantern shadow shape using id as deterministic seed.
    // sin(id * prime) gives a stable pseudo-random value in [-1,1] per lantern.
    pool.push({
      id,
      wx:  (Math.random() - 0.5) * 620,
      wy:  Math.random() * 180 - 150,
      wz:  z0 + Math.random() * (z1 - z0),
      type: TYPES[Math.floor(Math.random() * 3)],
      bs:   28 + Math.random() * 52,
      ph:   Math.random() * Math.PI * 2,
      bspd: 0.00035 + Math.random() * 0.0004,
      // Shadow variation: two overlapping blobs, each slightly different
      sh1x: 0.28 + Math.sin(id * 1.618) * 0.06,   // primary blob X offset (rightward)
      sh1y: Math.sin(id * 2.718) * 0.12,            // primary blob Y offset
      sh1w: 0.30 + Math.sin(id * 3.14)  * 0.04,    // primary blob width factor
      sh1h: 0.42 + Math.cos(id * 1.414) * 0.05,    // primary blob height factor
      sh1r: Math.sin(id * 0.77) * 0.3,              // primary blob rotation
      sh2x: 0.22 + Math.sin(id * 2.24)  * 0.06,    // secondary blob (adds irregularity)
      sh2y: Math.sin(id * 3.61) * 0.1 - 0.15,
      sh2w: 0.18 + Math.sin(id * 1.73)  * 0.04,
      sh2h: 0.32 + Math.cos(id * 2.45)  * 0.04,
      lit:    1.0,
      driftX: 0, driftVX: 0,
      gone:  false, played: false,
      freq:  NOTES[Math.floor(Math.random() * NOTES.length)],
      _sx: null, _sy: null,
    });
  }
}
spawn(180, genZ);

function proj(wx, wy, wz) {
  const rz = wz - camZ;
  if (rz < NEAR) return null;
  const s = FOCAL / rz;
  return { sx: wx * s + W / 2, sy: wy * s + H * HRZ, s, rz };
}

// ── DRAWING ──────────────────────────────────────────────────────────
function rr(x, y, w, h, r) {
  cx.beginPath();
  cx.moveTo(x+r,y); cx.lineTo(x+w-r,y); cx.arcTo(x+w,y,x+w,y+r,r);
  cx.lineTo(x+w,y+h-r); cx.arcTo(x+w,y+h,x+w-r,y+h,r);
  cx.lineTo(x+r,y+h); cx.arcTo(x,y+h,x,y+h-r,r);
  cx.lineTo(x,y+r); cx.arcTo(x,y,x+r,y,r);
  cx.closePath();
}

// GLOW: blurred white circle drawn BEFORE the body.
// The grain's screen passes then cut dense white sparkle into this bloom,
// turning a smooth gaussian into a grainy halo that dissolves into black.
function drawGlow(x, y, r, lit) {
  if (lit < 0.01) return;
  cx.save();
  cx.fillStyle = '#ffffff';
  cx.filter = `blur(${(r * 5) | 0}px)`;
  cx.globalAlpha = lit * 0.72;
  cx.beginPath(); cx.arc(x, y, r, 0, Math.PI * 2); cx.fill();
  cx.filter = `blur(${(r * 1.8) | 0}px)`;
  cx.globalAlpha = lit * 0.65;
  cx.beginPath(); cx.arc(x, y, r, 0, Math.PI * 2); cx.fill();
  cx.filter = 'none';
  cx.restore();
}

// SHADOW: two overlapping dark blobs clipped to the body, providing
// just enough volume cue without a clean, geometric gradient.
// The multiply grain will heavily texture these dark zones.
function drawShadow(l, x, y, w, h, lit, clipFn) {
  cx.save();
  clipFn();             // clip to lantern body shape
  cx.fillStyle = '#000000';
  // Primary shadow blob
  cx.globalAlpha = lit * 0.52;
  cx.beginPath();
  cx.ellipse(x + w*l.sh1x, y + h*l.sh1y, w*l.sh1w, h*l.sh1h, l.sh1r, 0, Math.PI*2);
  cx.fill();
  // Secondary shadow patch (irregular accent)
  cx.globalAlpha = lit * 0.36;
  cx.beginPath();
  cx.ellipse(x + w*l.sh2x, y + h*l.sh2y, w*l.sh2w, h*l.sh2h, l.sh1r+0.4, 0, Math.PI*2);
  cx.fill();
  cx.restore();
}

// ── CYLINDER ─────────────────────────────────────────────────────────
function drawCyl(l, x, y, w, h, lit) {
  const r = Math.min(w, h) * 0.13;
  if (w < 4) { drawGlow(x, y, w, lit); cx.save(); cx.fillStyle='#ffffff'; cx.globalAlpha=lit; cx.beginPath(); cx.arc(x,y,w*0.5,0,Math.PI*2); cx.fill(); cx.restore(); return; }

  drawGlow(x, y, Math.max(w, h) * 0.58, lit);

  cx.save();
  // Pure white body — slight edge blur so the body edge dissolves into grain
  cx.filter = `blur(${Math.max(0.8, w * 0.016)}px)`;
  cx.fillStyle = '#ffffff'; cx.globalAlpha = lit;
  rr(x-w/2, y-h/2, w, h, r); cx.fill();
  cx.filter = 'none';
  cx.restore();

  drawShadow(l, x, y, w, h, lit, () => { rr(x-w/2, y-h/2, w, h, r); cx.clip(); });

  cx.save();
  // Caps — pure dark
  cx.fillStyle = '#060402'; cx.globalAlpha = lit * 0.92;
  const ch = Math.max(2.5, h * 0.075);
  rr(x-w/2, y-h/2,      w, ch, 2); cx.fill();
  rr(x-w/2, y+h/2-ch,   w, ch, 2); cx.fill();
  // Ribs
  if (w > 6) {
    cx.strokeStyle = `rgba(0,0,0,${lit * 0.5})`;
    cx.lineWidth = Math.max(0.3, w * 0.026);
    for (let i = 1; i < 4; i++) {
      cx.beginPath();
      cx.moveTo(x - w*0.44, y - h/2 + h*i/4);
      cx.lineTo(x + w*0.44, y - h/2 + h*i/4);
      cx.stroke();
    }
  }
  // Ring + string
  if (w > 10) {
    const rR = w * 0.2;
    cx.strokeStyle = `rgba(200,198,190,${lit * 0.55})`; cx.lineWidth = Math.max(0.7, w*0.036);
    cx.beginPath(); cx.arc(x, y-h/2-rR*0.5, rR, 0, Math.PI*2); cx.stroke();
    cx.strokeStyle = `rgba(160,158,150,${lit * 0.26})`; cx.lineWidth = Math.max(0.3, w*0.01);
    cx.beginPath(); cx.moveTo(x, y-h/2-rR); cx.lineTo(x, y-h/2-h*0.5-rR); cx.stroke();
  }
  cx.restore();
}

// ── GLOBE ────────────────────────────────────────────────────────────
function drawGlobe(l, x, y, radius, lit) {
  if (radius < 4) { drawGlow(x, y, radius, lit); cx.save(); cx.fillStyle='#ffffff'; cx.globalAlpha=lit; cx.beginPath(); cx.arc(x,y,radius*0.5,0,Math.PI*2); cx.fill(); cx.restore(); return; }
  const w = radius * 2;

  drawGlow(x, y, radius * 1.08, lit);

  cx.save();
  cx.filter = `blur(${Math.max(0.8, radius * 0.016)}px)`;
  cx.fillStyle = '#ffffff'; cx.globalAlpha = lit;
  cx.beginPath(); cx.arc(x, y, radius, 0, Math.PI * 2); cx.fill();
  cx.filter = 'none';
  cx.restore();

  drawShadow(l, x, y, w, w, lit, () => { cx.beginPath(); cx.arc(x, y, radius, 0, Math.PI*2); cx.clip(); });

  cx.save();
  cx.fillStyle = '#060402'; cx.globalAlpha = lit * 0.9;
  cx.beginPath(); cx.arc(x, y-radius, radius*0.24, 0, Math.PI*2); cx.fill();
  cx.beginPath(); cx.arc(x, y+radius, radius*0.17, 0, Math.PI*2); cx.fill();
  if (radius > 8) {
    cx.strokeStyle = `rgba(160,158,150,${lit * 0.25})`; cx.lineWidth = Math.max(0.3, radius*0.014);
    cx.beginPath(); cx.moveTo(x, y-radius-radius*0.24); cx.lineTo(x, y-radius*2.1); cx.stroke();
  }
  cx.restore();
}

// ── TEARDROP ─────────────────────────────────────────────────────────
function drawTear(l, x, y, w, h, lit) {
  if (w < 4) { drawGlow(x, y, w, lit); cx.save(); cx.fillStyle='#ffffff'; cx.globalAlpha=lit; cx.beginPath(); cx.arc(x,y,w*0.5,0,Math.PI*2); cx.fill(); cx.restore(); return; }

  drawGlow(x, y, Math.max(w, h) * 0.55, lit);

  const by = y - h/2;
  function tearPath() {
    cx.beginPath();
    cx.moveTo(x, by + 2);
    cx.bezierCurveTo(x+w*0.38, by+2,     x+w/2, by+h*0.28, x+w/2, by+h*0.54);
    cx.bezierCurveTo(x+w/2,    by+h*0.84, x+w*0.28, by+h,   x,     by+h);
    cx.bezierCurveTo(x-w*0.28, by+h,     x-w/2, by+h*0.84, x-w/2, by+h*0.54);
    cx.bezierCurveTo(x-w/2,    by+h*0.28, x-w*0.38, by+2,   x,     by+2);
    cx.closePath();
  }

  cx.save();
  cx.filter = `blur(${Math.max(0.8, w * 0.016)}px)`;
  cx.fillStyle = '#ffffff'; cx.globalAlpha = lit;
  tearPath(); cx.fill();
  cx.filter = 'none';
  cx.restore();

  drawShadow(l, x, y, w, h, lit, () => { tearPath(); cx.clip(); });

  cx.save();
  cx.fillStyle = '#060402'; cx.globalAlpha = lit * 0.9;
  cx.beginPath(); cx.arc(x, by + 2, w*0.11, 0, Math.PI*2); cx.fill();
  if (w > 8) {
    cx.strokeStyle = `rgba(160,158,150,${lit * 0.24})`; cx.lineWidth = Math.max(0.3, w*0.01);
    cx.beginPath(); cx.moveTo(x, by); cx.lineTo(x, by-h*0.42); cx.stroke();
  }
  cx.restore();
}

// ── WATER ────────────────────────────────────────────────────────────
function drawWater(ts, vis) {
  const wy = H * 0.73;
  const wg = cx.createLinearGradient(0, wy, 0, H);
  wg.addColorStop(0,   'rgba(5,3,2,0)');
  wg.addColorStop(0.2, 'rgba(5,3,2,0.94)');
  wg.addColorStop(1,   'rgba(2,1,0,1)');
  cx.fillStyle = wg; cx.fillRect(0, wy, W, H - wy);

  for (let i = 0; i < 8; i++) {
    const ly = wy + 4 + i * 8, a = 0.04 - i * 0.004;
    if (a < 0.004) break;
    cx.strokeStyle = `rgba(255,255,255,${a})`; cx.lineWidth = 0.36;
    cx.beginPath(); cx.moveTo(0, ly + Math.sin(ts*0.00031+i)*1.6);
    for (let wx = 0; wx <= W; wx += 24)
      cx.lineTo(wx, ly + Math.sin(ts*0.00031 + wx*0.035 + i*0.55)*2.4);
    cx.stroke();
  }
  vis.forEach(({ sx, sy, sw, lit }) => {
    if (sy > wy - 20 || lit < 0.12) return;
    const ry = wy + (wy - sy) * 0.1, rw = Math.min(sw * 0.5, 50);
    const rg = cx.createRadialGradient(sx, ry, 0, sx, ry, rw * 1.8);
    rg.addColorStop(0, `rgba(255,255,255,${lit * 0.1})`);
    rg.addColorStop(1, 'rgba(0,0,0,0)');
    cx.fillStyle = rg; cx.fillRect(sx-rw*2, ry-rw*0.6, rw*4, rw*1.2);
  });
}

// ── MAIN LOOP ────────────────────────────────────────────────────────
let fc = 0, prevT = 0;

function frame(ts) {
  const dt = Math.min(ts - (prevT || ts), 50);
  prevT = ts;

  camZ += (tCamZ - camZ) * 0.074;
  const now = Date.now();
  const scrollActive = (now - lastScrollT) < 700;
  const cursorMoving = (now - lastCursorT) < 2200;

  if (camZ + 2200 > genZ) { spawn(genZ, genZ + 1400); genZ += 1400; }
  if (fc % 300 === 0) pool = pool.filter(l => !l.gone);

  // ── Background ──────────────────────────────────────────────────
  cx.fillStyle = '#030201'; cx.fillRect(0, 0, W, H);

  const mist = cx.createRadialGradient(W/2, H*0.41, 0, W/2, H*0.41, W*0.48);
  mist.addColorStop(0, 'rgba(255,250,235,0.012)'); mist.addColorStop(1, 'rgba(0,0,0,0)');
  cx.fillStyle = mist; cx.fillRect(0, 0, W, H);

  // ── Stars ───────────────────────────────────────────────────────
  stars.forEach(s => {
    const a = s.br * (0.42 + 0.58 * Math.sin(ts * s.sp * 0.001 + s.ph));
    if (a < 0.04) return;
    cx.fillStyle = `rgba(255,255,255,${a})`;
    cx.fillRect(s.x - s.r*0.5, s.y - s.r*0.5, s.r, s.r);
  });

  // ── Update ──────────────────────────────────────────────────────
  pool.forEach(l => {
    if (l.gone) return;
    const rz = l.wz - camZ;
    if (rz < -600) { if (Math.random() < 0.003) l.gone = true; return; }
    if (rz <= 0) return;

    const dx = (l._sx ?? W/2) - mouseX;
    const dy = (l._sy ?? H*HRZ) - mouseY;
    const prox = Math.max(0, 1 - Math.sqrt(dx*dx + dy*dy) / CR);

    if (scrollActive || (cursorMoving && prox > 0)) {
      const rate = scrollActive
        ? 0.001 + 0.002 * Math.max(0, 1 - rz/1300)
        : 0.0008 + 0.0022 * prox;
      l.lit = Math.min(1, l.lit + dt * rate);
      if (l.lit > 0.5) { l.played = false; l.driftVX *= 0.92; }
    } else {
      const rate = 0.00007 + (rz / FAR) * 0.00024;
      l.lit = Math.max(0, l.lit - dt * rate);
      if (l.lit < 0.008 && !l.played) {
        l.played  = true;
        l.driftVX = (Math.random() - 0.5) * 0.055;
        playNote(l.freq);
      }
    }
    if (l.lit === 0) {
      l.driftX += l.driftVX * dt;
      if (Math.abs(l.driftX) > 95) l.gone = true;
    }
  });

  // ── Visible ─────────────────────────────────────────────────────
  const vis = [];
  pool.forEach(l => {
    if (l.gone || l.lit < 0.005) return;
    const bob = Math.sin(ts * l.bspd + l.ph) * 7;
    const p = proj(l.wx + l.driftX, l.wy + bob, l.wz);
    if (!p) return;
    const sw = Math.min(l.bs * p.s, 188), sh = sw * 1.52, m = sw * 5;
    if (p.sx < -m || p.sx > W+m || p.sy < -sh*3 || p.sy > H*0.82) return;
    l._sx = p.sx; l._sy = p.sy;
    vis.push({ l, sx: p.sx, sy: p.sy, sw, sh, rz: p.rz, lit: l.lit });
  });
  vis.sort((a, b) => b.rz - a.rz);

  // ── Draw lanterns ───────────────────────────────────────────────
  vis.forEach(({ l, sx, sy, sw, sh, lit }) => {
    if      (l.type === 'globe') drawGlobe(l, sx, sy, sw/2, lit);
    else if (l.type === 'tear')  drawTear(l, sx, sy, sw, sh, lit);
    else                         drawCyl(l, sx, sy, sw, sh, lit);
  });

  // ── Water ───────────────────────────────────────────────────────
  drawWater(ts, vis);

  // ── Grain (multiply then screen — see comments at top) ──────────
  applyGrain(fc);

  // ── Vignette ────────────────────────────────────────────────────
  const v = cx.createRadialGradient(W/2, H*0.45, H*0.05, W/2, H*0.45, W*0.78);
  v.addColorStop(0, 'rgba(0,0,0,0)'); v.addColorStop(0.5, 'rgba(0,0,0,0.06)'); v.addColorStop(1, 'rgba(0,0,0,0.92)');
  cx.fillStyle = v; cx.fillRect(0, 0, W, H);

  // ── Watermark ───────────────────────────────────────────────────
  cx.globalAlpha = 0.11; cx.fillStyle = '#ffffff';
  cx.font = '9px Georgia, serif'; cx.textAlign = 'right';
  cx.fillText('a mildly upset experience', W - 16, H - 14);
  cx.globalAlpha = 1; cx.textAlign = 'left';

  fc++;
  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
})();
</script>
</body>
</html>
