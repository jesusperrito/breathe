<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>breath</title>
<!-- breath — a mildly upset experience, 2026 -->
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
canvas{display:block;cursor:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
/* breath — a mildly upset experience */
(function(){
'use strict';

const cv=document.getElementById('c');
let W=cv.width=window.innerWidth, H=cv.height=window.innerHeight;
const cx=cv.getContext('2d');
const oc=document.createElement('canvas');
oc.width=W; oc.height=H;
const dc=oc.getContext('2d',{willReadFrequently:true});
window.addEventListener('resize',()=>{
  W=cv.width=oc.width=window.innerWidth;
  H=cv.height=oc.height=window.innerHeight;
  buildStars();
});

// STOCHASTIC DITHER — equivalent to Photoshop Dissolve mode.
// Grey value (0-255) = probability of becoming pure white.
// No grey reaches the screen — only pixel density encodes tone.
const NL=1<<22, NM=NL-1;
const NT=new Uint8Array(NL);
for(let i=0;i<NL;i++) NT[i]=Math.random()*256|0;
let NO=0;
function dither(){
  const id=dc.getImageData(0,0,W,H), d=id.data;
  NO=(NO+1048583)&NM;
  for(let i=0;i<d.length;i+=4){
    const lum=(d[i]*77+d[i+1]*150+d[i+2]*29)>>8;
    if(lum<=1){d[i]=d[i+1]=d[i+2]=0;d[i+3]=255;continue;}
    if(NT[(NO+(i>>>2))&NM]<lum){d[i]=d[i+1]=d[i+2]=255;}
    else{d[i]=d[i+1]=d[i+2]=0;}
    d[i+3]=255;
  }
  dc.putImageData(id,0,0);
}

// GLOW SPRITES — radial grey falloff. Drawn W x H (not square) to match
// each lantern's shape. Cylinder gets a taller oval, globe gets a circle.
const GR=[8,16,28,46,72,110,162,220];
const GS=GR.map(R=>{
  const sz=R*2+2, g=document.createElement('canvas');
  g.width=g.height=sz;
  const gx=g.getContext('2d'), id=gx.createImageData(sz,sz), c0=R+0.5;
  for(let py=0;py<sz;py++) for(let px=0;px<sz;px++){
    const dx=px-c0, dy=py-c0, d=Math.sqrt(dx*dx+dy*dy);
    if(d>=R) continue;
    const i=(py*sz+px)*4;
    id.data[i]=id.data[i+1]=id.data[i+2]=(Math.pow(1-d/R,1.2)*255)|0;
    id.data[i+3]=255;
  }
  gx.putImageData(id,0,0); return g;
});
function gSpr(R){let b=0;for(let i=1;i<GR.length;i++)if(Math.abs(GR[i]-R)<Math.abs(GR[b]-R))b=i;return{sp:GS[b],nr:GR[b]};}
function drawGlow(x,y,gW,gH,lit){
  if(lit<0.01||Math.max(gW,gH)<3)return;
  const{sp,nr}=gSpr(Math.max(gW,gH));
  const sx=sp.width*gW/nr, sy=sp.width*gH/nr;
  dc.save();dc.globalAlpha=lit;dc.drawImage(sp,x-sx/2,y-sy/2,sx,sy);dc.restore();
}

// STARS
let stars=[];
function buildStars(){
  stars=Array.from({length:200},()=>({
    x:Math.random()*W,y:Math.random()*H*0.68,
    r:Math.random()<0.88?0.7:1.2+Math.random()*0.6,
    ph:Math.random()*Math.PI*2,sp:0.3+Math.random()*1.6,br:0.2+Math.random()*0.7
  }));
}
buildStars();

// AUDIO — Sigur Ros-inspired: open-fifth drone, slow melody, water noise, droplets.
// Hover: short accent pings on proximity entry (not sustained tones).
let AC=null,_conv=null,ambReady=false;
const NOTES=[130.81,146.83,164.81,195.99,220,261.63,293.66,329.63,392,440];
function mkRev(){
  const len=AC.sampleRate*8, buf=AC.createBuffer(2,len,AC.sampleRate);
  for(let c=0;c<2;c++){const d=buf.getChannelData(c);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2.3);}
  const v=AC.createConvolver();v.buffer=buf;return v;
}
function playAccent(freq){
  if(!AC||AC.state!=='running')return;
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    o.type='sine';o.frequency.value=freq*4;o.connect(g);g.connect(_conv);
    const t=AC.currentTime;
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.030,t+0.016);g.gain.exponentialRampToValueAtTime(0.001,t+0.7);
    o.start(t);o.stop(t+0.75);
  }catch(e){}
}
function playDrop(){
  if(!AC||AC.state!=='running')return;
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    const f=700+Math.random()*1400;o.type='sine';o.frequency.value=f;o.connect(g);g.connect(_conv);
    const t=AC.currentTime;
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.048,t+0.008);g.gain.exponentialRampToValueAtTime(0.001,t+0.38);
    o.frequency.setValueAtTime(f,t);o.frequency.exponentialRampToValueAtTime(f*0.14,t+0.32);
    o.start(t);o.stop(t+0.45);
  }catch(e){}
}
function initAudio(){
  if(AC){if(AC.state==='suspended')AC.resume();return;}
  AC=new(window.AudioContext||window.webkitAudioContext)();
  if(AC.state==='suspended')AC.resume();
  _conv=mkRev();
  const wet=AC.createGain();wet.gain.value=0.22;_conv.connect(wet);wet.connect(AC.destination);
  const dry=AC.createGain();dry.gain.value=0.025;dry.connect(AC.destination);
  // Drone: open-fifth pads, C & G, slight detuning for chorus
  [[65.41,0.09],[97.99,0.08],[130.81,0.07],[195.99,0.055],[261.63,0.04]].forEach(([f,vol],i)=>{
    [0,0.0015].forEach((det,j)=>{
      const o=AC.createOscillator(),g=AC.createGain();
      o.type='sine';o.frequency.value=f*(1+det);o.connect(g);g.connect(_conv);if(!j)g.connect(dry);
      g.gain.setValueAtTime(0,AC.currentTime);g.gain.linearRampToValueAtTime(vol*(j?0.4:1),AC.currentTime+5+i*1.8);o.start();
    });
  });
  // Slow modal melody
  const mel=[130.81,146.83,164.81,174.61,195.99,220,246.94,261.63,293.66];let mi=0;
  function pm(){
    if(!AC||AC.state!=='running'){setTimeout(pm,2000);return;}
    if(Math.random()<0.28)mi++;
    const f=mel[mi%mel.length];mi=(mi+1)%mel.length;
    const o=AC.createOscillator(),g=AC.createGain();
    o.type='sine';o.frequency.value=f;o.connect(g);g.connect(_conv);
    const t=AC.currentTime;
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.044,t+2.4);g.gain.exponentialRampToValueAtTime(0.001,t+9);
    o.start(t);o.stop(t+9.5);setTimeout(pm,4500+Math.random()*6500);
  }
  setTimeout(pm,6000);
  // Water ambiance noise
  const bLen=AC.sampleRate*3, nBuf=AC.createBuffer(1,bLen,AC.sampleRate);
  const nd=nBuf.getChannelData(0);for(let i=0;i<bLen;i++)nd[i]=Math.random()*2-1;
  const nSrc=AC.createBufferSource();nSrc.buffer=nBuf;nSrc.loop=true;
  const filt=AC.createBiquadFilter();filt.type='bandpass';filt.frequency.value=380;filt.Q.value=0.9;
  const nG=AC.createGain();nG.gain.value=0;
  nSrc.connect(filt);filt.connect(nG);nG.connect(_conv);nG.gain.linearRampToValueAtTime(0.020,AC.currentTime+4);nSrc.start();
  // Droplets
  (function drops(){setTimeout(()=>{if(ambReady)playDrop();drops();},6000+Math.random()*14000);})();
  ambReady=true;
}

// INPUT — scroll is intentionally slow, dragging feel
let camZ=0,tCamZ=0,mouseX=W*.5,mouseY=H*.5;
let prevMX=W*.5,prevMY=H*.5,mvX=0,mvY=0;
let lastScrollT=0,lastCursorT=0;
const NEAR=65,FAR=2500,FOCAL=720,HRZ=0.44,CR=280;
window.addEventListener('wheel',e=>{
  e.preventDefault();tCamZ=Math.max(0,tCamZ+e.deltaY*0.34);
  lastScrollT=lastCursorT=Date.now();initAudio();
},{passive:false});
window.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY;lastCursorT=Date.now();initAudio();});
['click','touchstart'].forEach(ev=>window.addEventListener(ev,()=>initAudio(),{passive:true}));

// LANTERN POOL
const TYPES=['cyl','globe','tear'];
let pool=[],spawnQ=[],lid=0,genZ=3000;
function mkL(wz){return{
  id:lid++,wx:(Math.random()-.5)*620,wy:Math.random()*180-150,wz,
  type:TYPES[Math.floor(Math.random()*3)],bs:28+Math.random()*52,
  ph:Math.random()*Math.PI*2,bspd:0.00035+Math.random()*.0004,
  lit:0.0,driftX:0,driftVX:0,dimmed:false,gone:false,hovered:false,
  swing:0,swingV:0,
  freq:NOTES[Math.floor(Math.random()*NOTES.length)],
  _sx:null,_sy:null,_rz:FAR,
};}
function qSpawn(z0,z1){
  const n=Math.round(5+(z1-z0)*.009);
  Array.from({length:n},()=>z0+Math.random()*(z1-z0)).sort((a,b)=>b-a).forEach(z=>spawnQ.push(z));
}
qSpawn(180,genZ);
function proj(wx,wy,wz){const rz=wz-camZ;if(rz<NEAR)return null;const s=FOCAL/rz;return{sx:wx*s+W/2,sy:wy*s+H*HRZ,s,rz};}

// EYE STATE
let eyeLit=0,eyeOpen=1,eyeBlinking=false,eyeBlinkT=0,eyeNextBlink=3500+Math.random()*4000;

// HELPERS
const grey=(v,l)=>{const c=(255*l*v)|0;return`rgb(${c},${c},${c})`;};
function rr(x,y,w,h,r){
  dc.beginPath();
  dc.moveTo(x+r,y);dc.lineTo(x+w-r,y);dc.arcTo(x+w,y,x+w,y+r,r);
  dc.lineTo(x+w,y+h-r);dc.arcTo(x+w,y+h,x+w-r,y+h,r);
  dc.lineTo(x+r,y+h);dc.arcTo(x,y+h,x,y+h-r,r);
  dc.lineTo(x,y+r);dc.arcTo(x,y,x+r,y,r);dc.closePath();
}

// CYLINDER — redesigned: narrow caps, very rounded, ring hook, tassel
function drawCyl(x,y,w,h,lit){
  if(w<4){dc.fillStyle=grey(1,lit);dc.beginPath();dc.arc(x,y,w*.5,0,Math.PI*2);dc.fill();return;}
  const bR=Math.min(w,h)*.22;
  const bg=dc.createLinearGradient(x-w/2,0,x+w/2,0);
  bg.addColorStop(0,   grey(0.56,lit));
  bg.addColorStop(0.24,grey(0.93,lit));
  bg.addColorStop(0.52,grey(1.00,lit));
  bg.addColorStop(0.76,grey(0.79,lit));
  bg.addColorStop(1,   grey(0.38,lit));
  dc.fillStyle=bg; rr(x-w/2,y-h/2,w,h,bR); dc.fill();
  const tcW=w*.64,tcH=Math.max(2.5,h*.065);
  dc.fillStyle=grey(0.22,lit); rr(x-tcW/2,y-h/2,tcW,tcH,2); dc.fill();
  const bcW=w*.68,bcH=Math.max(2.5,h*.065);
  dc.fillStyle=grey(0.22,lit); rr(x-bcW/2,y+h/2-bcH,bcW,bcH,2); dc.fill();
  if(w>9){
    dc.strokeStyle=grey(0.42,lit);dc.lineWidth=Math.max(0.28,w*.013);
    [1/3,2/3].forEach(t=>{dc.beginPath();dc.moveTo(x-w*.43,y-h/2+h*t);dc.lineTo(x+w*.43,y-h/2+h*t);dc.stroke();});
  }
  if(w>13){
    const rR=w*.12,ringY=y-h/2-tcH-rR*.5;
    dc.strokeStyle=grey(0.52,lit);dc.lineWidth=Math.max(0.6,w*.022);
    dc.beginPath();dc.arc(x,ringY,rR,0,Math.PI*2);dc.stroke();
    dc.strokeStyle=grey(0.36,lit);dc.lineWidth=Math.max(0.28,w*.005);
    dc.beginPath();dc.moveTo(x,ringY-rR);dc.lineTo(x,y-h/2-h*.5-tcH-rR*2);dc.stroke();
  }
  if(w>11){
    const tY=y+h/2+bcH,tLen=h*.14;
    dc.strokeStyle=grey(0.38,lit);dc.lineWidth=Math.max(0.28,w*.005);
    dc.beginPath();dc.moveTo(x,tY);dc.lineTo(x,tY+tLen*.5);dc.stroke();
    dc.fillStyle=grey(0.36,lit);
    dc.beginPath();dc.ellipse(x,tY+tLen*.5,Math.max(1,w*.038),Math.max(0.7,w*.026),0,0,Math.PI*2);dc.fill();
    if(w>18){for(let d=-1;d<=1;d+=2){dc.beginPath();dc.moveTo(x,tY+tLen*.5);dc.lineTo(x+d*w*.055,tY+tLen);dc.stroke();}}
  }
}

function drawGlobe(x,y,radius,lit){
  if(radius<3){dc.fillStyle=grey(1,lit);dc.beginPath();dc.arc(x,y,radius*.5,0,Math.PI*2);dc.fill();return;}
  const sg=dc.createRadialGradient(x-radius*.18,y-radius*.15,0,x,y,radius);
  sg.addColorStop(0,   grey(1.00,lit));sg.addColorStop(0.48,grey(0.90,lit));
  sg.addColorStop(0.76,grey(0.58,lit));sg.addColorStop(1,   grey(0.22,lit));
  dc.fillStyle=sg;dc.beginPath();dc.arc(x,y,radius,0,Math.PI*2);dc.fill();
  dc.fillStyle=grey(0.18,lit);
  dc.beginPath();dc.arc(x,y-radius,radius*.21,0,Math.PI*2);dc.fill();
  dc.beginPath();dc.arc(x,y+radius,radius*.13,0,Math.PI*2);dc.fill();
  if(radius>9){
    dc.strokeStyle=grey(0.40,lit);dc.lineWidth=Math.max(.28,radius*.009);
    dc.beginPath();dc.moveTo(x,y-radius-radius*.21);dc.lineTo(x,y-radius*2.0);dc.stroke();
  }
}

function drawTear(x,y,w,h,lit){
  if(w<4){dc.fillStyle=grey(1,lit);dc.beginPath();dc.arc(x,y,w*.5,0,Math.PI*2);dc.fill();return;}
  const by=y-h/2;
  function T(){dc.beginPath();dc.moveTo(x,by+2);
    dc.bezierCurveTo(x+w*.38,by+2,x+w/2,by+h*.28,x+w/2,by+h*.54);
    dc.bezierCurveTo(x+w/2,by+h*.84,x+w*.28,by+h,x,by+h);
    dc.bezierCurveTo(x-w*.28,by+h,x-w/2,by+h*.84,x-w/2,by+h*.54);
    dc.bezierCurveTo(x-w/2,by+h*.28,x-w*.38,by+2,x,by+2);dc.closePath();}
  const tg=dc.createRadialGradient(x-w*.15,y,0,x,y,Math.max(w,h)*.6);
  tg.addColorStop(0,  grey(1.00,lit));tg.addColorStop(0.55,grey(0.86,lit));tg.addColorStop(1,grey(0.36,lit));
  dc.fillStyle=tg;T();dc.fill();
  dc.fillStyle=grey(0.18,lit);dc.beginPath();dc.arc(x,by+2,w*.1,0,Math.PI*2);dc.fill();
  if(w>9){dc.strokeStyle=grey(0.40,lit);dc.lineWidth=Math.max(.28,w*.007);dc.beginPath();dc.moveTo(x,by);dc.lineTo(x,by-h*.42);dc.stroke();}
}

// WATER — reflection uses glow sprite stretched vertically (no rectangular mask)
function drawWater(ts,vis){
  const wy=H*.73;
  const wg=dc.createLinearGradient(0,wy,0,H);
  wg.addColorStop(0,'rgba(0,0,0,0)');wg.addColorStop(.15,'rgba(0,0,0,.95)');wg.addColorStop(1,'#000');
  dc.fillStyle=wg;dc.fillRect(0,wy,W,H-wy);
  for(let i=0;i<8;i++){
    const ly=wy+4+i*8,a=.034-i*.004;if(a<.003)break;
    dc.strokeStyle=`rgba(255,255,255,${a})`;dc.lineWidth=.33;
    dc.beginPath();dc.moveTo(0,ly+Math.sin(ts*.00031+i)*1.6);
    for(let wx=0;wx<=W;wx+=24)dc.lineTo(wx,ly+Math.sin(ts*.00031+wx*.035+i*.55)*2.4);dc.stroke();
  }
  vis.forEach(({sx,sy,sw,lit})=>{
    if(sy>wy-20||lit<.14)return;
    const ry=wy+(wy-sy)*.09, rw=Math.min(sw*.40,40);
    const{sp,nr}=gSpr(rw);const sc=rw/nr;
    const rdW=sp.width*sc*1.0, rdH=sp.width*sc*1.9;
    dc.save();dc.globalAlpha=lit*.10;dc.drawImage(sp,sx-rdW/2,ry-rdH/2,rdW,rdH);dc.restore();
  });
}

// EYES — 50px total width, blink, follow cursor, fade with inactivity.
// Drawn on offscreen canvas so they get dithered — grainy, eerie.
const EW=20,EH=13,EGAP=10,EY=30;
function drawEyes(){
  if(eyeLit<0.01)return;
  const ECX=W/2;
  [-1,1].forEach(side=>{
    const ex=ECX+side*(EGAP/2+EW/2), ey=EY;
    const oh=EH*eyeOpen*Math.min(1,eyeLit*2);
    if(oh<0.5)return;
    dc.fillStyle=grey(0.93,eyeLit);
    dc.beginPath();dc.moveTo(ex-EW/2,ey);
    dc.bezierCurveTo(ex-EW/3,ey-oh*.82, ex+EW/3,ey-oh*.82, ex+EW/2,ey);
    dc.bezierCurveTo(ex+EW/3,ey+oh*.33, ex-EW/3,ey+oh*.33, ex-EW/2,ey);
    dc.closePath();dc.fill();
    const dxM=mouseX-ex, dyM=mouseY-ey, dm=Math.sqrt(dxM*dxM+dyM*dyM);
    const maxOff=EW*.13, pFac=Math.min(1,dm/350);
    const px=ex+(dm>0?dxM/dm:0)*maxOff*pFac;
    const py=ey+(dm>0?dyM/dm:0)*maxOff*.42*pFac;
    const pR=Math.min(oh*.36,EW*.21)*eyeOpen;
    if(pR>0.4){dc.fillStyle=grey(0.06,eyeLit);dc.beginPath();dc.arc(px,py,pR,0,Math.PI*2);dc.fill();}
  });
}

function drawCursorHalo(ts){
  const s=Date.now()-lastCursorT;if(s>4000)return;
  const f=Math.max(0,1-s/3000),p=.72+.28*Math.sin(ts*.0038);
  cx.save();cx.fillStyle='#fff';
  cx.filter='blur(14px)';cx.globalAlpha=f*p*.42;cx.beginPath();cx.arc(mouseX,mouseY,16,0,Math.PI*2);cx.fill();
  cx.filter='blur(4px)';cx.globalAlpha=f*p*.65;cx.beginPath();cx.arc(mouseX,mouseY,6,0,Math.PI*2);cx.fill();
  cx.filter='none';cx.globalAlpha=f;cx.beginPath();cx.arc(mouseX,mouseY,2,0,Math.PI*2);cx.fill();cx.restore();
}

let fc=0,prevT=0;
function frame(ts){
  const dt=Math.min(ts-(prevT||ts),50);prevT=ts;
  camZ+=(tCamZ-camZ)*.04; // slow dragging camera
  const now=Date.now(),scrollOn=(now-lastScrollT)<700,cursorOn=(now-lastCursorT)<2200;

  // Mouse velocity for wind
  mvX=(mouseX-prevMX)*.45+mvX*.55; mvY=(mouseY-prevMY)*.45+mvY*.55;
  prevMX=mouseX;prevMY=mouseY;
  const mSpeed=Math.sqrt(mvX*mvX+mvY*mvY);

  // Eye update
  if(cursorOn)eyeLit=Math.min(1,eyeLit+dt*.007);
  else eyeLit=Math.max(0,eyeLit-dt*.0003);
  eyeNextBlink-=dt;
  if(eyeNextBlink<=0&&!eyeBlinking){eyeBlinking=true;eyeBlinkT=0;eyeNextBlink=2500+Math.random()*5000;}
  if(eyeBlinking){
    eyeBlinkT+=dt;const ph=eyeBlinkT/220;
    if(ph<0.4)eyeOpen=1-ph/0.4;
    else if(ph<0.6)eyeOpen=0;
    else if(ph<1)eyeOpen=(ph-0.6)/0.4;
    else{eyeBlinking=false;eyeOpen=1;}
  }

  if(camZ+2200>genZ){qSpawn(genZ,genZ+1400);genZ+=1400;}
  if(fc%6===0&&spawnQ.length>0)pool.push(mkL(spawnQ.pop())); // gradual: 1 per 6 frames
  if(fc%300===0)pool=pool.filter(l=>!l.gone);

  dc.fillStyle='#000';dc.fillRect(0,0,W,H);

  stars.forEach(s=>{
    const a=s.br*(.42+.58*Math.sin(ts*s.sp*.001+s.ph));if(a<.04)return;
    const v=(a*255)|0;dc.fillStyle=`rgb(${v},${v},${v})`;dc.fillRect(s.x-s.r*.5,s.y-s.r*.5,s.r,s.r);
  });

  pool.forEach(l=>{
    if(l.gone)return;
    const rz=l.wz-camZ;
    if(rz<-600){if(Math.random()<.003)l.gone=true;return;}
    if(rz<=0)return;
    const dx=(l._sx??W/2)-mouseX,dy=(l._sy??H*HRZ)-mouseY;
    const dist=Math.sqrt(dx*dx+dy*dy),prox=Math.max(0,1-dist/CR);
    if(cursorOn&&prox>0.1&&l.lit>0.08&&!l.hovered){l.hovered=true;playAccent(l.freq);}
    if(prox<0.05)l.hovered=false;
    // Wind swing
    if(cursorOn&&mSpeed>1.5&&dist<CR*.7){
      const windDir=mvX>=0?1:-1;
      l.swingV+=windDir*(mSpeed/20)*(1-dist/(CR*.7))*.0006;
    }
    l.swingV*=0.97;l.swing+=l.swingV;l.swing*=0.95;
    l.swing=Math.max(-0.18,Math.min(0.18,l.swing));
    if(scrollOn||(cursorOn&&prox>0)){
      l.lit=Math.min(1,l.lit+dt*(scrollOn?0.001+0.002*Math.max(0,1-rz/1300):0.0008+0.0022*prox));
      if(l.lit>0.22){l.driftVX=0;l.dimmed=false;}
    }else{
      l.lit=Math.max(0,l.lit-dt*(0.00016+(rz/FAR)*.00048));
      if(l.lit===0&&!l.dimmed){l.dimmed=true;l.driftVX=(Math.random()-.5)*.055;}
    }
    if(l.lit===0){l.driftX+=l.driftVX*dt;if(Math.abs(l.driftX)>95)l.gone=true;}
    l._rz=rz;
  });

  const vis=[];
  pool.forEach(l=>{
    if(l.gone||l.lit<.005)return;
    const bob=Math.sin(ts*l.bspd+l.ph)*7;
    const swX=Math.sin(l.swing)*18;
    const p=proj(l.wx+l.driftX+swX,l.wy+bob,l.wz);if(!p)return;
    const sw=Math.min(l.bs*p.s,188),sh=sw*1.52,m=sw*5;
    if(p.sx<-m||p.sx>W+m||p.sy<-sh*3||p.sy>H*.82)return;
    l._sx=p.sx;l._sy=p.sy;l._rz=p.rz;
    vis.push({l,sx:p.sx,sy:p.sy,sw,sh,rz:p.rz,lit:l.lit});
  });
  vis.sort((a,b)=>b.rz-a.rz);

  // GLOW with shape-matched ellipses
  vis.forEach(({l,sx,sy,sw,sh,lit})=>{
    if(l.type==='globe')drawGlow(sx,sy,sw*1.8,sw*1.8,lit);
    else if(l.type==='cyl')drawGlow(sx,sy,sw*1.6,sh*1.25,lit);
    else drawGlow(sx,sy,sw*1.6,sh*1.35,lit);
  });

  vis.forEach(({l,sx,sy,sw,sh,lit})=>{
    if(l.type==='globe')drawGlobe(sx,sy,sw/2,lit);
    else if(l.type==='tear')drawTear(sx,sy,sw,sh,lit);
    else drawCyl(sx,sy,sw,sh,lit);
  });

  drawEyes();
  drawWater(ts,vis);

  const vg=dc.createRadialGradient(W/2,H*.45,H*.05,W/2,H*.45,W*.78);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(.5,'rgba(0,0,0,.05)');vg.addColorStop(1,'rgba(0,0,0,.93)');
  dc.fillStyle=vg;dc.fillRect(0,0,W,H);

  dither();
  cx.drawImage(oc,0,0);

  drawCursorHalo(ts);
  cx.globalAlpha=.1;cx.fillStyle='#fff';cx.font='9px Georgia,serif';cx.textAlign='center';
  cx.fillText('a mildly upset experience',W/2,H-14);
  cx.globalAlpha=1;cx.textAlign='left';

  fc++;requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
})();
</script>
